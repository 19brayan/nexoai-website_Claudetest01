<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — NexoAI</title>

  <!-- Fuente Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* Nuevo diseño minimalista para el registro */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif;
      background: #fafafa;
      color: #0e0e0e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    /* Tarjeta de registro */
    .login-card {
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
    }

    /* Logo */
    .login-logo {
      text-align: center;
      margin-bottom: 6px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #0e0e0e;
    }

    .login-logo span { color: #0e0e0e; }

    /* Badge */
    .login-badge { text-align: center; margin-bottom: 28px; }

    .login-badge span {
      display: inline-block;
      background: #f0f0f0;
      color: #555;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
    }

    /* Título y subtítulo */
    .login-titulo { font-size: 20px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.02em; }
    .login-subtitulo { font-size: 14px; color: #555; margin-bottom: 28px; }

    /* Grupos de campo */
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-group label { font-size: 13px; font-weight: 600; color: #0e0e0e; }

    .form-group input {
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      font-family: inherit;
      color: #0e0e0e;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus { border-color: #0e0e0e; background: white; }
    .form-group input::placeholder { color: #bbb; }

    /* Mensajes */
    .error-msg {
      display: none;
      background: #fff0f0;
      border: 1px solid #fcc;
      color: #c00;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 16px;
      text-align: center;
    }

    .error-msg.visible { display: block; }

    .exito-msg {
      display: none;
      background: #f0faf0;
      border: 1px solid #b5e5b5;
      color: #1a7a1a;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 16px;
      text-align: center;
    }

    .exito-msg.visible { display: block; }

    /* Botón principal */
    .btn-login {
      width: 100%;
      background: #0e0e0e;
      color: white;
      border: none;
      border-radius: 100px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-login:hover { opacity: 0.75; }
    .btn-login:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Footer de links */
    .login-footer { text-align: center; margin-top: 20px; font-size: 13px; color: #555; }
    .login-footer a { color: #0e0e0e; text-decoration: none; font-weight: 600; }
    .login-footer a:hover { text-decoration: underline; }
  </style>
</head>

<body>

  <!-- =============================================
       TARJETA DE REGISTRO
       Formulario para crear una nueva cuenta de cliente
  ============================================= -->
  <div class="login-card">

    <!-- Logo de NexoAI -->
    <div class="login-logo">Nexo<span>AI</span></div>
    <div class="login-badge"><span>Portal de clientes</span></div>

    <h1 class="login-titulo">Crear cuenta</h1>
    <p class="login-subtitulo">Empieza gratis con el plan Starter</p>

    <!-- Mensaje de error (credenciales inválidas o email duplicado) -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Mensaje de éxito tras registro correcto -->
    <div class="exito-msg" id="exitoMsg">¡Cuenta creada! Redirigiendo...</div>

    <!-- Formulario de registro -->
    <form id="registroForm" novalidate>

      <!-- Campo: nombre completo -->
      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          placeholder="Tu nombre completo"
          autocomplete="name"
          required
        />
      </div>

      <!-- Campo: correo electrónico -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="tu@correo.com"
          autocomplete="email"
          required
        />
      </div>

      <!-- Campo: contraseña -->
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Mínimo 6 caracteres"
          autocomplete="new-password"
          required
          minlength="6"
        />
      </div>

      <button type="submit" class="btn-login" id="btnRegistro">Crear cuenta</button>

    </form>

    <!-- Enlace para ir al login si ya tiene cuenta -->
    <div class="login-footer">
      ¿Ya tienes cuenta? <a href="login-cliente.html">Inicia sesión</a>
    </div>

  </div>

  <!-- =============================================
       JAVASCRIPT DEL REGISTRO
       Envía los datos a POST /api/usuarios/registro
       y redirige a login.html si el registro es exitoso
  ============================================= -->
  <script>

    // Maneja el envío del formulario de registro
    document.getElementById('registroForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const nombre    = document.getElementById('nombre').value.trim();
      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value;
      const errorMsg  = document.getElementById('errorMsg');
      const exitoMsg  = document.getElementById('exitoMsg');
      const btnReg    = document.getElementById('btnRegistro');

      // Oculta mensajes previos antes de cada intento
      errorMsg.classList.remove('visible');
      exitoMsg.classList.remove('visible');

      // Validación local mínima antes de llamar al servidor
      if (!nombre || !email || !password) {
        errorMsg.textContent = 'Por favor completa todos los campos.';
        errorMsg.classList.add('visible');
        return;
      }

      // Deshabilita el botón mientras procesa la solicitud
      btnReg.disabled    = true;
      btnReg.textContent = 'Creando cuenta...';

      try {
        // Llama a la API de registro con los datos del formulario
        const res = await fetch('/api/usuarios/registro', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ nombre, email, password })
        });

        const data = await res.json();

        if (res.ok && data.ok) {
          // Muestra mensaje de éxito y redirige a login.html
          exitoMsg.classList.add('visible');
          setTimeout(() => {
            window.location.href = 'login-cliente.html';
          }, 1200);
        } else {
          // Muestra el error devuelto por el servidor (ej: email ya registrado)
          errorMsg.textContent = data.error || 'No se pudo crear la cuenta. Inténtalo de nuevo.';
          errorMsg.classList.add('visible');
          btnReg.disabled    = false;
          btnReg.textContent = 'Crear cuenta';
        }

      } catch {
        // Error de red: el servidor no está disponible
        errorMsg.textContent = 'No se pudo conectar con el servidor.';
        errorMsg.classList.add('visible');
        btnReg.disabled    = false;
        btnReg.textContent = 'Crear cuenta';
      }
    });

  </script>

</body>
</html>
