<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — NexoAI</title>

  <style>
    /* =============================================
       VARIABLES Y RESET
       Paleta oscura idéntica a login.html
    ============================================= */
    :root {
      --bg-principal: #0d0d1a;
      --bg-tarjeta:   #13132a;
      --morado:       #6C63FF;
      --morado-claro: #8f88ff;
      --blanco:       #ffffff;
      --gris-texto:   #a0a0c0;
      --borde:        rgba(108, 99, 255, 0.25);
      --rojo:         #e74c3c;
      --verde:        #2ecc71;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: var(--bg-principal);
      color: var(--blanco);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* =============================================
       TARJETA DE REGISTRO
       Mismo estilo visual que login.html
    ============================================= */
    .login-card {
      background: var(--bg-tarjeta);
      border: 1px solid var(--borde);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    /* Logo de NexoAI centrado en la parte superior */
    .login-logo {
      text-align: center;
      margin-bottom: 0.5rem;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--blanco);
    }

    .login-logo span {
      color: var(--morado);
    }

    /* Badge de portal de clientes */
    .login-badge {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-badge span {
      display: inline-block;
      background: rgba(108, 99, 255, 0.15);
      border: 1px solid var(--borde);
      color: var(--morado-claro);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 0.25rem 0.8rem;
      border-radius: 50px;
    }

    /* Título y subtítulo del formulario */
    .login-titulo {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .login-subtitulo {
      font-size: 0.85rem;
      color: var(--gris-texto);
      margin-bottom: 1.8rem;
    }

    /* Grupos de campo: etiqueta + input */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.1rem;
    }

    .form-group label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--gris-texto);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--blanco);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: var(--morado);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    /* Mensaje de error en rojo (oculto por defecto) */
    .error-msg {
      display: none;
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid var(--rojo);
      color: var(--rojo);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 1rem;
      text-align: center;
    }

    .error-msg.visible {
      display: block;
    }

    /* Mensaje de éxito en verde (oculto por defecto) */
    .exito-msg {
      display: none;
      background: rgba(46, 204, 113, 0.1);
      border: 1px solid var(--verde);
      color: var(--verde);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 1rem;
      text-align: center;
    }

    .exito-msg.visible {
      display: block;
    }

    /* Botón principal de registro */
    .btn-login {
      width: 100%;
      background: var(--morado);
      color: var(--blanco);
      border: none;
      border-radius: 8px;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(108, 99, 255, 0.35);
    }

    .btn-login:hover {
      background: var(--morado-claro);
      transform: translateY(-1px);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Footer con enlace a login */
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.82rem;
      color: var(--gris-texto);
    }

    .login-footer a {
      color: var(--morado-claro);
      text-decoration: none;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <!-- =============================================
       TARJETA DE REGISTRO
       Formulario para crear una nueva cuenta de cliente
  ============================================= -->
  <div class="login-card">

    <!-- Logo de NexoAI -->
    <div class="login-logo">Nexo<span>AI</span></div>
    <div class="login-badge"><span>Portal de clientes</span></div>

    <h1 class="login-titulo">Crear cuenta</h1>
    <p class="login-subtitulo">Empieza gratis con el plan Starter</p>

    <!-- Mensaje de error (credenciales inválidas o email duplicado) -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Mensaje de éxito tras registro correcto -->
    <div class="exito-msg" id="exitoMsg">¡Cuenta creada! Redirigiendo...</div>

    <!-- Formulario de registro -->
    <form id="registroForm" novalidate>

      <!-- Campo: nombre completo -->
      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          placeholder="Tu nombre completo"
          autocomplete="name"
          required
        />
      </div>

      <!-- Campo: correo electrónico -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="tu@correo.com"
          autocomplete="email"
          required
        />
      </div>

      <!-- Campo: contraseña -->
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Mínimo 6 caracteres"
          autocomplete="new-password"
          required
          minlength="6"
        />
      </div>

      <button type="submit" class="btn-login" id="btnRegistro">Crear cuenta</button>

    </form>

    <!-- Enlace para ir al login si ya tiene cuenta -->
    <div class="login-footer">
      ¿Ya tienes cuenta? <a href="login-cliente.html">Inicia sesión</a>
    </div>

  </div>

  <!-- =============================================
       JAVASCRIPT DEL REGISTRO
       Envía los datos a POST /api/usuarios/registro
       y redirige a login.html si el registro es exitoso
  ============================================= -->
  <script>

    // Maneja el envío del formulario de registro
    document.getElementById('registroForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const nombre    = document.getElementById('nombre').value.trim();
      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value;
      const errorMsg  = document.getElementById('errorMsg');
      const exitoMsg  = document.getElementById('exitoMsg');
      const btnReg    = document.getElementById('btnRegistro');

      // Oculta mensajes previos antes de cada intento
      errorMsg.classList.remove('visible');
      exitoMsg.classList.remove('visible');

      // Validación local mínima antes de llamar al servidor
      if (!nombre || !email || !password) {
        errorMsg.textContent = 'Por favor completa todos los campos.';
        errorMsg.classList.add('visible');
        return;
      }

      // Deshabilita el botón mientras procesa la solicitud
      btnReg.disabled    = true;
      btnReg.textContent = 'Creando cuenta...';

      try {
        // Llama a la API de registro con los datos del formulario
        const res = await fetch('/api/usuarios/registro', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ nombre, email, password })
        });

        const data = await res.json();

        if (res.ok && data.ok) {
          // Muestra mensaje de éxito y redirige a login.html
          exitoMsg.classList.add('visible');
          setTimeout(() => {
            window.location.href = 'login-cliente.html';
          }, 1200);
        } else {
          // Muestra el error devuelto por el servidor (ej: email ya registrado)
          errorMsg.textContent = data.error || 'No se pudo crear la cuenta. Inténtalo de nuevo.';
          errorMsg.classList.add('visible');
          btnReg.disabled    = false;
          btnReg.textContent = 'Crear cuenta';
        }

      } catch {
        // Error de red: el servidor no está disponible
        errorMsg.textContent = 'No se pudo conectar con el servidor.';
        errorMsg.classList.add('visible');
        btnReg.disabled    = false;
        btnReg.textContent = 'Crear cuenta';
      }
    });

  </script>

</body>
</html>
