<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — NexoAI</title>

  <!-- Fuente Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* Nuevo diseño minimalista para el login de admin */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif;
      background: #fafafa;
      color: #0e0e0e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    /* Tarjeta de login centrada */
    .login-card {
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
    }

    /* Logo */
    .login-logo {
      text-align: center;
      margin-bottom: 6px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #0e0e0e;
    }

    .login-logo span { color: #0e0e0e; }

    /* Badge de área privada */
    .login-badge {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-badge span {
      display: inline-block;
      background: #f0f0f0;
      color: #555;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
    }

    /* Título y subtítulo */
    .login-titulo { font-size: 20px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.02em; }
    .login-subtitulo { font-size: 14px; color: #555; margin-bottom: 28px; }

    /* Grupos de campo */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: #0e0e0e;
    }

    .form-group input {
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      font-family: inherit;
      color: #0e0e0e;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #0e0e0e;
      background: white;
    }

    .form-group input::placeholder { color: #bbb; }

    /* Mensaje de error */
    .error-msg {
      display: none;
      background: #fff0f0;
      border: 1px solid #fcc;
      color: #c00;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 16px;
      text-align: center;
    }

    .error-msg.visible { display: block; }

    /* Botón de acción */
    .btn-login {
      width: 100%;
      background: #0e0e0e;
      color: white;
      border: none;
      border-radius: 100px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-login:hover { opacity: 0.75; }
    .btn-login:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Footer de links */
    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #555;
    }

    .login-footer a { color: #0e0e0e; text-decoration: none; font-weight: 600; }
    .login-footer a:hover { text-decoration: underline; }
  </style>
</head>

<body>

  <!-- =============================================
       TARJETA DE LOGIN
       Formulario centrado para acceder al panel admin
  ============================================= -->
  <div class="login-card">

    <!-- Logo de NexoAI -->
    <div class="login-logo">Nexo<span>AI</span></div>
    <div class="login-badge"><span>Área privada</span></div>

    <h1 class="login-titulo">Iniciar sesión</h1>
    <p class="login-subtitulo">Accede al panel de administración</p>

    <!-- Mensaje de error (se muestra si las credenciales son incorrectas) -->
    <div class="error-msg" id="errorMsg">Usuario o contraseña incorrectos.</div>

    <!-- Formulario de login -->
    <form id="loginForm" novalidate>

      <!-- Campo: nombre de usuario -->
      <div class="form-group">
        <label for="username">Usuario</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="admin"
          autocomplete="username"
          required
        />
      </div>

      <!-- Campo: contraseña -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn-login" id="btnLogin">Iniciar sesión</button>

    </form>

    <!-- Enlaces del footer: registro y volver al sitio -->
    <div class="login-footer">
      ¿No tienes cuenta? <a href="registro.html">Regístrate</a>
    </div>
    <div class="login-footer" style="margin-top:0.6rem;">
      <a href="../index.html">← Volver al sitio</a>
    </div>

  </div>

  <!-- =============================================
       JAVASCRIPT DEL LOGIN
       Envía las credenciales a la API, guarda el token
       JWT en localStorage y redirige al panel admin
  ============================================= -->
  <script>

    // Decodifica el payload de un JWT sin librería externa
    function decodificarJWT(token) {
      try {
        const payload = token.split('.')[1];
        return JSON.parse(atob(payload));
      } catch {
        return null;
      }
    }

    // Devuelve la URL de destino según el rol incluido en el payload del token
    function rutaPorRol(token) {
      const payload = decodificarJWT(token);
      if (payload && payload.rol === 'cliente') return 'dashboard.html';
      return 'admin.html'; // rol "admin" u otro valor conocido
    }

    // Si ya hay un token guardado, redirige sin pedir credenciales de nuevo
    const tokenGuardado = localStorage.getItem('nexoai_token');
    if (tokenGuardado) {
      fetch('/api/auth/verify', {
        headers: { 'Authorization': `Bearer ${tokenGuardado}` }
      })
      .then(res => res.json())
      .then(data => {
        if (data.exito) window.location.href = rutaPorRol(tokenGuardado);
      })
      .catch(() => {
        localStorage.removeItem('nexoai_token');
      });
    }

    // Maneja el envío del formulario de login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username  = document.getElementById('username').value.trim();
      const password  = document.getElementById('password').value;
      const errorMsg  = document.getElementById('errorMsg');
      const btnLogin  = document.getElementById('btnLogin');

      // Oculta el error anterior y deshabilita el botón mientras espera
      errorMsg.classList.remove('visible');
      btnLogin.disabled    = true;
      btnLogin.textContent = 'Verificando...';

      try {
        const res  = await fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.exito) {
          // Guarda el token y redirige según el rol que trae el JWT
          localStorage.setItem('nexoai_token', data.token);
          window.location.href = rutaPorRol(data.token);
        } else {
          errorMsg.textContent = data.error || 'Usuario o contraseña incorrectos.';
          errorMsg.classList.add('visible');
          btnLogin.disabled    = false;
          btnLogin.textContent = 'Iniciar sesión';
        }

      } catch {
        errorMsg.textContent = 'No se pudo conectar con el servidor.';
        errorMsg.classList.add('visible');
        btnLogin.disabled    = false;
        btnLogin.textContent = 'Iniciar sesión';
      }
    });

  </script>

</body>
</html>
